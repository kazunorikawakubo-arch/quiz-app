<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢検1級 四字熟語穴埋め</title>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      max-width: 450px;
      margin: 0 auto;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.4rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    .meta-info {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .question-kanji {
      font-size: 2.2rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 4px;
      margin: 15px 0;
      color: #1a73e8;
    }
    .meaning {
      background-color: #f1f3f4;
      padding: 15px;
      border-radius: 8px;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    button {
      padding: 16px 6px;
      font-size: 1.5rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
    }
    button:active {
      background-color: #e8f0fe;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #dadce0;
      margin-bottom: 15px;
      background-color: white;
    }
    .score-box {
      text-align: center;
      padding: 20px 0;
    }
    .score-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    .score-number {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a73e8;
      margin-bottom: 15px;
    }
    .retry-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h2>漢検1級 四字熟語穴埋め</h2>

  <select id="categorySelect" onchange="changeCategory()">
    <option value="all">すべて表示</option>
    <option value="あ行">あ行</option>
    <option value="か行">か行</option>
    <option value="さ行">さ行</option>
    <option value="た行">た行</option>
    <option value="な行">な行</option>
    <option value="は行">は行</option>
    <option value="ま行">ま行</option>
    <option value="や行">や行</option>
    <option value="ら行">ら行</option>
    <option value="わ行">わ行</option>
  </select>

  <div id="quizContainer" class="card">
  </div>

  <!-- 問題データを外部ファイルから読み込みます -->
  <script src="quiz-data.js"></script>

  <script>
    let currentFilteredQuiz = [];
    let currentIndex = 0;
    let score = 0;
    let targetChar = "";

    function changeCategory() {
      const selectedCategory = document.getElementById("categorySelect").value;
      if (selectedCategory === "all") {
        currentFilteredQuiz = [...quizData];
      } else {
        currentFilteredQuiz = quizData.filter(item => item.category === selectedCategory);
      }
      restartQuiz();
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function getRandomDummyKanji(correctKanji) {
      let allKanjiChars = quizData.map(item => item.kanji).join("").split("");
      let filteredChars = allKanjiChars.filter(c => c !== correctKanji);
      let uniqueChars = [...new Set(filteredChars)];
      uniqueChars.sort(() => 0.5 - Math.random());
      return uniqueChars.slice(0, 3);
    }

    function checkAnswer(selectedChar, correctKanji, fullKanji, reading) {
      if (selectedChar === correctKanji) {
        alert(`⭕️ 正解です！\n【${fullKanji}（${reading}）】`);
        score++;
      } else {
        alert(`❌ 不正解...\n正解は「${correctKanji}」でした。\n【${fullKanji}（${reading}）】`);
      }
      currentIndex++;
      showQuestion();
    }

    function showQuestion() {
      const container = document.getElementById("quizContainer");

      if (currentFilteredQuiz.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>このカテゴリーには問題がありません。</p>";
        return;
      }

      if (currentIndex >= currentFilteredQuiz.length) {
        const percentage = Math.round((score / currentFilteredQuiz.length) * 100);
        container.innerHTML = `
          <div class="score-box">
            <div class="score-title">🎉 お疲れ様でした！</div>
            <div class="score-number">${score} / ${currentFilteredQuiz.length} 問正解</div>
            <p>正解率: <strong>${percentage}%</strong></p>
            <button class="retry-btn" onclick="restartQuiz()">もう一度挑戦する 🔄</button>
          </div>
        `;
        return;
      }

      const q = currentFilteredQuiz[currentIndex];
      
      const blankIndex = Math.floor(Math.random() * 4);
      targetChar = q.kanji[blankIndex];
      const maskedKanji = q.kanji.substring(0, blankIndex) + "〇" + q.kanji.substring(blankIndex + 1);

      const dummyChars = getRandomDummyKanji(targetChar);
      const options = [targetChar, ...dummyChars].sort(() => 0.5 - Math.random());

      container.innerHTML = `
        <div class="meta-info">
          <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}</span>
          <span>カテゴリ: ${q.category}</span>
        </div>
        <div class="question-kanji">${maskedKanji}</div>
        <div class="meaning">【意味】<br>${q.meaning}</div>
        <div class="options">
          ${options.map(char => `
            <button onclick="checkAnswer('${char}', '${targetChar}', '${q.kanji}', '${q.reading}')">
              ${char}
            </button>
          `).join('')}
        </div>
      `;
    }

    changeCategory();
  </script>
</body>
</html>
