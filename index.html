<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢検1級 四字熟語マスター</title>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      max-width: 450px;
      margin: 0 auto;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.4rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    .meta-info {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .reading {
      font-size: 1.6rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      margin: 15px 0;
      color: #1a73e8;
    }
    .meaning {
      background-color: #f1f3f4;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      padding: 14px 6px;
      font-size: 1.05rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      line-height: 1.4;
    }
    button:active {
      background-color: #e8f0fe;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #dadce0;
      margin-bottom: 15px;
      background-color: white;
    }
    .score-box {
      text-align: center;
      padding: 20px 0;
    }
    .score-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    .score-number {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a73e8;
      margin-bottom: 15px;
    }
    .retry-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
    }
    ruby {
      ruby-position: over;
    }
    rt {
      font-size: 0.6em;
      color: #555;
      font-weight: normal;
    }
  </style>
</head>
<body>

  <h2>漢検1級 四字熟語</h2>

  <select id="categorySelect" onchange="changeCategory()">
    <option value="all">すべて表示</option>
    <option value="あ行">あ行</option>
    <option value="か行">か行</option>
    <option value="さ行">さ行</option>
    <option value="た行">た行</option>
    <option value="は行">は行</option>
  </select>

  <div id="quizContainer" class="card">
  </div>

  <script>
    const quizData = [
      { kanji: "哀鴻遍野", reading: "あいこうへんや", meaning: "戦乱や災害などで流浪し、飢えや苦しみにあえぐ人々がいたるところに満ちているさま。", category: "あ行" },
      { kanji: "悪衣悪食", reading: "あくいあくしょく", meaning: "粗末な衣服と粗末な食べ物。また、そのような貧しい生活。", category: "あ行" },
      { kanji: "暗香浮動", reading: "あんこうふどう", meaning: "どこからともなく梅の花のよい香りが漂ってくるさま。", category: "あ行" },
      { kanji: "意気揚揚", reading: "いきようよう", meaning: "得意そうで誇らしげなさま。元気や満足感に満ちあふれているさま。", category: "あ行" },
      { kanji: "一言九鼎", reading: "いちげんきゅうてい", meaning: "一言の発言が九鼎（きわめて重い鼎）のように重みがあり、大きな影響力をもつこと。", category: "あ行" },
      { kanji: "佳人薄命", reading: "かじんはくめい", meaning: "美人にはとかく不幸な者や若死にする者が多いということ。", category: "か行" },
      { kanji: "夏炉冬扇", reading: "かろとうせん", meaning: "夏のいろりと冬のおうぎ。役に立たない無用なもののたとえ。", category: "か行" },
      { kanji: "巧言令色", reading: "こうげんれいしょく", meaning: "言葉を飾り、顔つきを繕って、人に気に入られようとすること。", category: "か行" },
      { kanji: "三尺童子", reading: "さんしゃくどうじ", meaning: "背丈が三尺ほどの幼い子供。転じて、知識や経験の浅い者のたとえ。", category: "さ行" },
      { kanji: "紫気東来", reading: "しきとうらい", meaning: "めでたい気（めでたい兆し）が東から漂ってくること。吉兆のたとえ。", category: "さ行" },
      { kanji: "泰山北斗", reading: "たいざんほくと", meaning: "学問・芸術など、ある分野で第一人者として仰ぎ尊ばれる人のたとえ。", category: "た行" },
      { kanji: "百八煩悩", reading: "ひゃくはちぼんのう", meaning: "人間にあるすべての苦しみや迷いの原因となる悩みのこと。", category: "は行" }
    ];

    let currentFilteredQuiz = [];
    let currentIndex = 0;
    let score = 0;

    function changeCategory() {
      const selectedCategory = document.getElementById("categorySelect").value;
      if (selectedCategory === "all") {
        currentFilteredQuiz = [...quizData];
      } else {
        currentFilteredQuiz = quizData.filter(item => item.category === selectedCategory);
      }
      restartQuiz();
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function getRandomOptions(correctItem) {
      const wrongItems = quizData.filter(item => item.kanji !== correctItem.kanji);
      const shuffledWrong = wrongItems.sort(() => 0.5 - Math.random());
      const selectedWrong = shuffledWrong.slice(0, 3);
      const options = [correctItem, ...selectedWrong];
      return options.sort(() => 0.5 - Math.random());
    }

    function checkAnswer(selectedKanji, correctKanji, reading) {
      if (selectedKanji === correctKanji) {
        alert(`⭕️ 正解です！\n【${correctKanji}（${reading}）】`);
        score++;
      } else {
        alert(`❌ 不正解...\n正解は「${correctKanji}（${reading}）」でした。`);
      }
      currentIndex++;
      showQuestion();
    }

    function showQuestion() {
      const container = document.getElementById("quizContainer");

      if (currentFilteredQuiz.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>このカテゴリーには問題がありません。</p>";
        return;
      }

      if (currentIndex >= currentFilteredQuiz.length) {
        const percentage = Math.round((score / currentFilteredQuiz.length) * 100);
        container.innerHTML = `
          <div class="score-box">
            <div class="score-title">🎉 お疲れ様でした！</div>
            <div class="score-number">${score} / ${currentFilteredQuiz.length} 問正解</div>
            <p>正解率: <strong>${percentage}%</strong></p>
            <button class="retry-btn" onclick="restartQuiz()">もう一度挑戦する 🔄</button>
          </div>
        `;
        return;
      }

      const q = currentFilteredQuiz[currentIndex];
      const options = getRandomOptions(q);

      container.innerHTML = `
        <div class="meta-info">
          <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}</span>
          <span>カテゴリ: ${q.category}</span>
        </div>
        <div class="reading">${q.reading}</div>
        <div class="meaning">【意味】<br>${q.meaning}</div>
        <div class="options">
          ${options.map(opt => `
            <button onclick="checkAnswer('${opt.kanji}', '${q.kanji}', '${q.reading}')">
              <ruby>${opt.kanji}<rt>${opt.reading}</rt></ruby>
            </button>
          `).join('')}
        </div>
      `;
    }

    changeCategory();
  </script>
</body>
</html>
