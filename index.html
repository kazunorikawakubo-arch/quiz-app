<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢検1級 四字熟語マスター</title>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      max-width: 450px;
      margin: 0 auto;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.4rem;
    }
    /* モード切り替えタブ */
    .mode-container {
      display: flex;
      gap: 6px;
      margin-bottom: 15px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 4px;
      font-size: 0.85rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      color: #555;
      cursor: pointer;
    }
    .mode-btn.active {
      background-color: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    .meta-info {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .question-box {
      font-size: 2.2rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      margin: 15px 0;
      color: #1a73e8;
      line-height: 1.3;
    }
    .meaning {
      background-color: #f1f3f4;
      padding: 15px;
      border-radius: 8px;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    /* 意味選択モード用（選択肢が長いため1列表示） */
    .options.vertical {
      grid-template-columns: 1fr;
    }
    .option-btn {
      padding: 14px 8px;
      font-size: 1.2rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      line-height: 1.4;
    }
    .options.vertical .option-btn {
      font-size: 0.95rem;
      text-align: left;
      font-weight: normal;
      padding: 12px 14px;
    }
    .option-btn:active {
      background-color: #e8f0fe;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #dadce0;
      margin-bottom: 15px;
      background-color: white;
    }
    .score-box {
      text-align: center;
      padding: 20px 0;
    }
    .score-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    .score-number {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a73e8;
      margin-bottom: 15px;
    }
    .retry-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>漢検1級 四字熟語</h2>

  <!-- モード切替タブ -->
  <div class="mode-container">
    <button id="mode-blank" class="mode-btn active" onclick="switchMode('blank')">🧩 穴埋め</button>
    <button id="mode-reading" class="mode-btn" onclick="switchMode('reading')">📖 読み</button>
    <button id="mode-meaning" class="mode-btn" onclick="switchMode('meaning')">💡 意味</button>
  </div>

  <select id="categorySelect" onchange="changeCategory()">
    <option value="all">すべて表示</option>
    <option value="あ行">あ行</option>
    <option value="か行">か行</option>
    <option value="さ行">さ行</option>
    <option value="た行">た行</option>
    <option value="な行">な行</option>
    <option value="は行">は行</option>
    <option value="ま行">ま行</option>
    <option value="や行">や行</option>
    <option value="ら行">ら行</option>
    <option value="わ行">わ行</option>
  </select>

  <div id="quizContainer" class="card">
  </div>

  <!-- 外部問題データ -->
  <script src="quiz-data.js"></script>

  <script>
    let currentMode = 'blank'; // 'blank', 'reading', 'meaning'
    let currentFilteredQuiz = [];
    let currentIndex = 0;
    let score = 0;

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');
      restartQuiz();
    }

    function changeCategory() {
      const selectedCategory = document.getElementById("categorySelect").value;
      if (selectedCategory === "all") {
        currentFilteredQuiz = [...quizData];
      } else {
        currentFilteredQuiz = quizData.filter(item => item.category === selectedCategory);
      }
      restartQuiz();
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    // ダミーの選択肢を取得する汎用関数
    function getRandomOptions(correctItem, key) {
      let wrongItems = quizData.filter(item => item[key] !== correctItem[key]);
      let uniqueWrong = [];
      let seen = new Set();
      for (let item of wrongItems) {
        if (!seen.has(item[key])) {
          seen.add(item[key]);
          uniqueWrong.push(item);
        }
      }
      uniqueWrong.sort(() => 0.5 - Math.random());
      let selectedWrong = uniqueWrong.slice(0, 3);
      let options = [correctItem, ...selectedWrong];
      return options.sort(() => 0.5 - Math.random());
    }

    // 穴埋め用のダミー漢字を取得
    function getRandomDummyKanji(correctChar) {
      let allChars = quizData.map(item => item.kanji).join("").split("");
      let filtered = [...new Set(allChars.filter(c => c !== correctChar))];
      filtered.sort(() => 0.5 - Math.random());
      return filtered.slice(0, 3);
    }

    function checkAnswer(selectedVal, correctVal, fullKanji, reading, meaning) {
      if (selectedVal === correctVal) {
        alert(`⭕️ 正解です！\n【${fullKanji}（${reading}）】\n${meaning}`);
        score++;
      } else {
        alert(`❌ 不正解...\n正解は【${fullKanji}（${reading}）】でした。\n${meaning}`);
      }
      currentIndex++;
      showQuestion();
    }

    function showQuestion() {
      const container = document.getElementById("quizContainer");

      if (currentFilteredQuiz.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>このカテゴリーには問題がありません。</p>";
        return;
      }

      if (currentIndex >= currentFilteredQuiz.length) {
        const percentage = Math.round((score / currentFilteredQuiz.length) * 100);
        container.innerHTML = `
          <div class="score-box">
            <div class="score-title">🎉 お疲れ様でした！</div>
            <div class="score-number">${score} / ${currentFilteredQuiz.length} 問正解</div>
            <p>正解率: <strong>${percentage}%</strong></p>
            <button class="retry-btn" onclick="restartQuiz()">もう一度挑戦する 🔄</button>
          </div>
        `;
        return;
      }

      const q = currentFilteredQuiz[currentIndex];

      if (currentMode === 'blank') {
        // --- 穴埋めモード ---
        const blankIndex = Math.floor(Math.random() * 4);
        const targetChar = q.kanji[blankIndex];
        const maskedKanji = q.kanji.substring(0, blankIndex) + "〇" + q.kanji.substring(blankIndex + 1);
        const dummyChars = getRandomDummyKanji(targetChar);
        const options = [targetChar, ...dummyChars].sort(() => 0.5 - Math.random());

        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（穴埋め）</span>
            <span>カテゴリ: ${q.category}</span>
          </div>
          <div class="question-box">${maskedKanji}</div>
          <div class="meaning">【意味】<br>${q.meaning}</div>
          <div class="options">
            ${options.map(char => `
              <button class="option-btn" onclick="checkAnswer('${char}', '${targetChar}', '${q.kanji}', '${q.reading}', '${q.meaning}')">
                ${char}
              </button>
            `).join('')}
          </div>
        `;

      } else if (currentMode === 'reading') {
        // --- 読みモード ---
        const options = getRandomOptions(q, 'reading');

        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（読み）</span>
            <span>カテゴリ: ${q.category}</span>
          </div>
          <div class="question-box">${q.kanji}</div>
          <div class="meaning">【意味】<br>${q.meaning}</div>
          <div class="options">
            ${options.map(opt => `
              <button class="option-btn" onclick="checkAnswer('${opt.reading}', '${q.reading}', '${q.kanji}', '${q.reading}', '${q.meaning}')">
                ${opt.reading}
              </button>
            `).join('')}
          </div>
        `;

      } else if (currentMode === 'meaning') {
        // --- 意味選択モード ---
        const options = getRandomOptions(q, 'meaning');

        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（意味）</span>
            <span>カテゴリ: ${q.category}</span>
          </div>
          <div class="question-box">${q.kanji}</div>
          <div style="text-align:center; color:#666; margin-bottom:15px;">（${q.reading}）</div>
          <div class="options vertical">
            ${options.map(opt => `
              <button class="option-btn" onclick="checkAnswer('${opt.meaning.replace(/'/g, "\\'")}', '${q.meaning.replace(/'/g, "\\'")}', '${q.kanji}', '${q.reading}', '${q.meaning.replace(/'/g, "\\'")}')">
                ${opt.meaning}
              </button>
            `).join('')}
          </div>
        `;
      }
    }

    changeCategory();
  </script>
</body>
</html>
