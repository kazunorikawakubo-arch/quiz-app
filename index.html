<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢検1級 マスター</title>

  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      max-width: 450px;
      margin: 0 auto;
      background-color: #f8f9fa;
      color: #333;
    }
    h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 1.4rem;
    }
    .filter-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    select {
      flex: 1;
      padding: 10px;
      font-size: 0.95rem;
      border-radius: 8px;
      border: 1px solid #dadce0;
      background-color: white;
      font-weight: bold;
    }
    .mode-container {
      display: flex;
      gap: 6px;
      margin-bottom: 15px;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 4px;
      font-size: 0.85rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      color: #555;
      cursor: pointer;
    }
    .mode-btn.active {
      background-color: #1a73e8;
      color: white;
      border-color: #1a73e8;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }
    .meta-info {
      display: flex;
      justify-content: space-between;
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }
    .question-box {
      font-size: 2.2rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      margin: 15px 0;
      color: #1a73e8;
      line-height: 1.3;
    }
    .meaning {
      background-color: #f1f3f4;
      padding: 15px;
      border-radius: 8px;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .options.vertical {
      grid-template-columns: 1fr;
    }
    .option-btn {
      padding: 14px 8px;
      font-size: 1.1rem;
      font-weight: bold;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      line-height: 1.4;
    }
    .options.vertical .option-btn {
      font-size: 0.95rem;
      text-align: left;
      font-weight: normal;
      padding: 12px 14px;
    }
    .option-btn:active {
      background-color: #e8f0fe;
    }
    .input-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .answer-input {
      width: 100%;
      padding: 14px;
      font-size: 1.2rem;
      border: 2px solid #1a73e8;
      border-radius: 8px;
      text-align: center;
      outline: none;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      font-weight: bold;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .score-box {
      text-align: center;
      padding: 20px 0;
    }
    .score-title {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    .score-number {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a73e8;
      margin-bottom: 15px;
    }
    .retry-btn {
      width: 100%;
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .review-btn {
      width: 100%;
      background-color: #e37400;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.1rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h2>漢検1級 マスター</h2>

  <div class="filter-group">
    <select id="genreSelect" onchange="filterQuiz()">
      <option value="四字熟語">四字熟語</option>
      <option value="動詞・形容詞">動詞・形容詞</option>
      <option value="故事・成句">故事・成句</option>
    </select>

    <select id="categorySelect" onchange="filterQuiz()">
      <option value="all">すべて表示</option>
      <option value="あ行">あ行</option>
      <option value="か行">か行</option>
      <option value="さ行">さ行</option>
      <option value="た行">た行</option>
      <option value="な行">な行</option>
      <option value="は行">は行</option>
      <option value="ま行">ま行</option>
      <option value="や行">や行</option>
      <option value="ら行">ら行</option>
      <option value="わ行">わ行</option>
    </select>
  </div>

  <div class="mode-container">
    <button id="mode-blank" class="mode-btn active" onclick="switchMode('blank')">🧩 穴埋め</button>
    <button id="mode-reading" class="mode-btn" onclick="switchMode('reading')">📖 読み</button>
    <button id="mode-meaning" class="mode-btn" onclick="switchMode('meaning')">💡 意味</button>
  </div>

  <div id="quizContainer" class="card">
  </div>

  <script src="quiz-data.js"></script>

  <script>
    let currentMode = 'blank';
    let currentFilteredQuiz = [];
    let currentIndex = 0;
    let score = 0;

    // 💾 LocalStorage から間違えた問題を読み込む（データがない場合は空の配列）
    let wrongQuestions = JSON.parse(localStorage.getItem('kanken_wrong_questions')) || [];

    function saveWrongQuestions() {
      // 💾 LocalStorage に間違えた問題の配列を保存する
      localStorage.setItem('kanken_wrong_questions', JSON.stringify(wrongQuestions));
    }

    function switchMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');
      restartQuiz();
    }

    function filterQuiz() {
      const selectedGenre = document.getElementById("genreSelect").value;
      const selectedCategory = document.getElementById("categorySelect").value;

      currentFilteredQuiz = quizData.filter(item => {
        const matchGenre = item.genre === selectedGenre;
        const matchCategory = selectedCategory === "all" || item.category === selectedCategory;
        return matchGenre && matchCategory;
      });

      restartQuiz();
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function startReviewMode() {
      if (wrongQuestions.length === 0) return;
      currentFilteredQuiz = [...wrongQuestions];
      currentIndex = 0;
      score = 0;
      showQuestion();
    }

    function isHiragana(char) {
      return /^[\u3040-\u309F]$/.test(char);
    }

    function parseKanjiAndOkurigana(kanjiStr, readingStr) {
      let okurigana = "";
      for (let i = kanjiStr.length - 1; i >= 0; i--) {
        if (isHiragana(kanjiStr[i])) {
          okurigana = kanjiStr[i] + okurigana;
        } else {
          break;
        }
      }
      
      let stemReading = readingStr;
      if (okurigana && readingStr.endsWith(okurigana)) {
        stemReading = readingStr.slice(0, readingStr.length - okurigana.length);
      }
      
      return { stemReading, okurigana };
    }

    function getRandomOptions(correctItem, key) {
      let wrongItems = quizData.filter(item => item.genre === correctItem.genre && item[key] !== correctItem[key]);
      let uniqueWrong = [];
      let seen = new Set();
      for (let item of wrongItems) {
        if (!seen.has(item[key])) {
          seen.add(item[key]);
          uniqueWrong.push(item);
        }
      }
      uniqueWrong.sort(() => 0.5 - Math.random());
      let selectedWrong = uniqueWrong.slice(0, 3);
      let options = [correctItem, ...selectedWrong];
      return options.sort(() => 0.5 - Math.random());
    }

    function getRandomDummyKanji(correctChar, currentGenre) {
      let genreData = quizData.filter(item => item.genre === currentGenre);
      let allChars = genreData.map(item => item.kanji).join("").split("");
      let filtered = [...new Set(allChars.filter(c => c !== correctChar && !isHiragana(c)))];
      filtered.sort(() => 0.5 - Math.random());
      
      if (filtered.length < 3) {
        let fallbackChars = quizData.map(item => item.kanji).join("").split("");
        let extra = [...new Set(fallbackChars.filter(c => c !== correctChar && !isHiragana(c)))];
        filtered = [...new Set([...filtered, ...extra])];
      }

      return filtered.slice(0, 3);
    }

    function checkAnswer(selectedVal, correctVal, fullKanji, reading, meaning) {
      const currentQuestion = currentFilteredQuiz[currentIndex];
      const cleanSelected = selectedVal.trim();
      const cleanCorrect = correctVal.trim();

      const { stemReading } = parseKanjiAndOkurigana(fullKanji, reading);
      const isCorrect = (cleanSelected === cleanCorrect) || (cleanSelected === stemReading);

      if (isCorrect) {
        alert(`⭕️ 正解です！\n【${fullKanji}（${reading}）】\n${meaning}`);
        score++;

        // ⭕️ 正解した場合：復習リストにあったら削除して保存を更新
        wrongQuestions = wrongQuestions.filter(item => item.kanji !== currentQuestion.kanji);
        saveWrongQuestions();

      } else {
        alert(`❌ 不正解...\nあなたの回答: 「${cleanSelected}」\n正解は【${fullKanji}（${reading}）】でした。\n${meaning}`);

        // ❌ 不正解の場合：間違えた問題リストに追加して保存を更新
        if (!wrongQuestions.some(item => item.kanji === currentQuestion.kanji)) {
          wrongQuestions.push(currentQuestion);
          saveWrongQuestions();
        }
      }
      currentIndex++;
      showQuestion();
    }

    function submitInputAnswer(correctReading, fullKanji, meaning) {
      const inputEl = document.getElementById("textAnswerInput");
      if (!inputEl) return;
      checkAnswer(inputEl.value, correctReading, fullKanji, correctReading, meaning);
    }

    function showQuestion() {
      const container = document.getElementById("quizContainer");

      if (currentFilteredQuiz.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>この条件に該当する問題がありません。</p>";
        return;
      }

      if (currentIndex >= currentFilteredQuiz.length) {
        const percentage = Math.round((score / currentFilteredQuiz.length) * 100);
        
        let reviewButtonHtml = "";
        if (wrongQuestions.length > 0) {
          reviewButtonHtml = `
            <button class="review-btn" onclick="startReviewMode()">
              保存された間違えた ${wrongQuestions.length} 問を復習する 🔄
            </button>
          `;
        }

        container.innerHTML = `
          <div class="score-box">
            <div class="score-title">🎉 お疲れ様でした！</div>
            <div class="score-number">${score} / ${currentFilteredQuiz.length} 問正解</div>
            <p>正解率: <strong>${percentage}%</strong></p>
            ${reviewButtonHtml}
            <button class="retry-btn" onclick="restartQuiz()">最初から解き直す 🔄</button>
          </div>
        `;
        return;
      }

      const q = currentFilteredQuiz[currentIndex];

      if (currentMode === 'blank') {
        let kanjiIndices = [];
        for (let i = 0; i < q.kanji.length; i++) {
          if (!isHiragana(q.kanji[i])) {
            kanjiIndices.push(i);
          }
        }
        
        let targetIndex = kanjiIndices.length > 0 
          ? kanjiIndices[Math.floor(Math.random() * kanjiIndices.length)] 
          : 0;

        const targetChar = q.kanji[targetIndex];
        const maskedKanji = q.kanji.substring(0, targetIndex) + "〇" + q.kanji.substring(targetIndex + 1);
        const dummyChars = getRandomDummyKanji(targetChar, q.genre);
        const options = [targetChar, ...dummyChars].sort(() => 0.5 - Math.random());

        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（穴埋め）</span>
            <span>ジャンル: ${q.genre}</span>
          </div>
          <div class="question-box">${maskedKanji}</div>
          <div class="meaning">【意味】<br>${q.meaning}</div>
          <div class="options">
            ${options.map(char => `
              <button class="option-btn" onclick="checkAnswer('${char}', '${targetChar}', '${q.kanji}', '${q.reading}', '${q.meaning}')">
                ${char}
              </button>
            `).join('')}
          </div>
        `;

      } else if (currentMode === 'reading') {
        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（読み入力）</span>
            <span>ジャンル: ${q.genre}</span>
          </div>
          <div class="question-box">${q.kanji}</div>
          <div class="meaning">【意味】<br>${q.meaning}</div>
          <form class="input-container" onsubmit="event.preventDefault(); submitInputAnswer('${q.reading}', '${q.kanji}', '${q.meaning.replace(/'/g, "\\'")}');">
            <input type="text" id="textAnswerInput" class="answer-input" placeholder="ひらがなで入力" autofocus autocomplete="off">
            <button type="submit" class="submit-btn">回答する 🚀</button>
          </form>
        `;

        setTimeout(() => {
          const el = document.getElementById("textAnswerInput");
          if (el) el.focus();
        }, 50);

      } else if (currentMode === 'meaning') {
        const options = getRandomOptions(q, 'meaning');

        container.innerHTML = `
          <div class="meta-info">
            <span>問題 ${currentIndex + 1} / ${currentFilteredQuiz.length}（意味）</span>
            <span>ジャンル: ${q.genre}</span>
          </div>
          <div class="question-box">${q.kanji}</div>
          <div style="text-align:center; color:#666; margin-bottom:15px;">（${q.reading}）</div>
          <div class="options vertical">
            ${options.map(opt => `
              <button class="option-btn" onclick="checkAnswer('${opt.meaning.replace(/'/g, "\\'")}', '${q.meaning.replace(/'/g, "\\'")}', '${q.kanji}', '${q.reading}', '${q.meaning.replace(/'/g, "\\'")}')">
                ${opt.meaning}
              </button>
            `).join('')}
          </div>
        `;
      }
    }

    filterQuiz();
  </script>
</body>
</html>
